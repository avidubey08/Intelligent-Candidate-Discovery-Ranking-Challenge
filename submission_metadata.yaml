ai_usage_summary: |
  Used AI assistant for architecture discussion, code scaffolding, and review.
  All ranking logic, feature weights, and proxy-term dictionaries are
  hand-authored and documented. No candidate data was fed to any LLM during ranking.

methodology_summary: |
  Rule-based ranker with five scoring buckets: skill/role fit (40%),
  career substance (35%), logistics (15%), education (10%) — combined into
  a base fit score, multiplied by a behavioral availability factor built
  from non-linear decay on last_active_date and avg_response_time_hours.
  Honeypot detection via rule-based consistency checks + Isolation Forest
  on engineered cross-field features. Output is a transparent weighted sum,
  fully decomposable per candidate for Stage 4/5 review.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
